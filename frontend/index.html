<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Usuarios</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
   
    <style>
        /* ESTILOS PERSONALIZADOS */
        
        /* Asegura que el contenedor principal permita el scroll natural del navegador */
        #contact-container {
            padding-bottom: 50px;
            min-height: 400px;
        }

        /* Ajuste visual para que las fotos de perfil no se peguen al texto */
        .contact-card img {
            border-bottom: 1px solid #eee;
        }

        /* Configuración de la lista de contactos con scroll independiente */
        #list-view {
            max-height: 80vh; /* Altura máxima del 80% de la pantalla */
            overflow-y: auto; /* Activa scroll vertical si hay muchos contactos */
            overflow-x: hidden;
            padding-right: 10px;
        }

        /* Animaciones para las tarjetas de contacto (Efecto Hover) */
        .contact-card { 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
            border: none; 
            overflow: hidden; 
        }
        .contact-card:hover { 
            transform: translateY(-5px); /* Se eleva un poco al pasar el ratón */
            box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important; 
        }
        
        /* Color dorado para la estrella de favoritos */
        .favorite-star { color: #ffc107; cursor: pointer; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-person-rolodex me-2"></i>Gestor de Usuarios
            </a>
        </div>
    </nav>

    <div class="container">
        <ul class="nav nav-tabs mb-4" id="contactTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="list-tab" data-bs-toggle="tab" data-bs-target="#list-view" type="button">
                    <i class="bi bi-list-ul me-1"></i> Lista de Contactos
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="form-tab" data-bs-toggle="tab" data-bs-target="#form-view" type="button">
                    <i class="bi bi-person-plus-fill me-1"></i> Nuevo Contacto
                </button>
            </li>
        </ul>

        <div class="tab-content" id="contactTabsContent">
            
            <div class="tab-pane fade show active" id="list-view" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>Mis Contactos</h3>
                    <div id="loading-spinner" class="spinner-border spinner-border-sm text-primary d-none" role="status"></div>
                </div>

                <div class="mb-4">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="search-input" class="form-control border-start-0" placeholder="Buscar por nombre o email...">
                    </div>
                </div>
                
                <div class="row g-3" id="contact-container">
                    <div class="col-12 text-center text-muted py-5">
                        <i class="bi bi-cloud-download fs-1"></i>
                        <p>Cargando datos desde el servidor...</p>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="form-view" role="tabpanel">
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6">
                        <div class="card shadow border-0">
                            <div class="card-body p-4">
                                <h4 class="card-title mb-4 text-center">Registrar Nuevo Usuario</h4>
                                
                                <form id="contact-form">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Nombre Completo</label>
                                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-semibold">Teléfono</label>
                                            <input type="text" name="telefono" class="form-control" placeholder="123456789" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-semibold">Email</label>
                                            <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" required>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Categoría</label>
                                        <select name="categoria" class="form-select" required>
                                            <option value="General">General</option>
                                            <option value="Trabajo">Trabajo</option>
                                            <option value="Familia">Familia</option>
                                            <option value="Amigos">Amigos</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">URL de la Foto</label>
                                        <input type="url" name="foto" class="form-control" placeholder="https://ejemplo.com/foto.jpg">
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Notas / Observaciones</label>
                                        <textarea name="notas" class="form-control" rows="3" placeholder="Información adicional..."></textarea>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <input type="checkbox" class="btn-check" id="favSwitch" name="favorito" autocomplete="off">
                                        <label class="btn btn-outline-success d-flex align-items-center justify-content-center gap-2" for="favSwitch" style="width: fit-content;">
                                            <i class="bi bi-check-lg"></i> 
                                            <span>Marcar como favorito</span>
                                        </label>
                                    </div>

                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary btn-lg">
                                            <i class="bi bi-check-circle me-1"></i> Guardar Usuario
                                        </button>
                                        <button type="reset" class="btn btn-light border">Limpiar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="msgToast" class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-body-text">
                    Mensaje del sistema
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog shadow-lg">
            <div class="modal-content border-0">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i>Editar Contacto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="edit-form">
                        <input type="hidden" name="id" id="edit-id">
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" name="nombre" id="edit-nombre" class="form-control" oninput="this.value = this.value.replace(/[^a-b]/g, '')" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold">Teléfono</label>
                                <input type="text" name="telefono" id="edit-telefono" class="form-control" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" name="email" id="edit-email" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">URL Foto</label>
                            <input type="url" name="foto" id="edit-foto" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="edit-categoria" class="form-label">Categoría</label>
                            <select class="form-select" id="edit-categoria" name="categoria">
                                <option value="">Sin Categoría</option>
                                <option value="Trabajo">Trabajo</option>
                                <option value="Familia">Familia</option>
                                <option value="Amigos">Amigos</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Notas</label>
                            <textarea name="notas" id="edit-notas" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-warning fw-bold py-2">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
